# Render static site config - Jam Room / Home Band
# https://render.com/docs/static-sites
services:
  - type: web
    name: jam-room
    runtime: static
    buildCommand: echo "Static site - no build required"
    staticPublishPath: website
    envVars:
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
